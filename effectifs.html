<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SASD - Effectifs HP</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #F9F6F0; color: #2C1E11; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 4px; border-top: 5px solid #4A3018; }
        h1 { font-family: 'Oswald', sans-serif; color: #4A3018; text-transform: uppercase; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #4A3018; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #EAEAEA; }
        .badge-module { background: #8B5A2B; color: white; padding: 4px 8px; border-radius: 3px; font-size: 0.8rem; }
        .btn-back { display: inline-block; margin-bottom: 20px; color: #4A3018; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="btn-back">⬅ Retour à l'accueil</a>
        <h1>Effectifs de la Division HP</h1>
        <table>
            <thead><tr><th>Matricule</th><th>Nom</th><th>Grade</th><th>Brevet</th></tr></thead>
            <tbody id="roster-view"></tbody>
        </table>
    </div>

    <script>
        const data = JSON.parse(localStorage.getItem('sasd_academy_roster')) || [];
        const body = document.getElementById('roster-view');
        data.forEach(agent => {
            body.innerHTML += `<tr><td>#${agent.matricule}</td><td>${agent.nom}</td><td>${agent.grade}</td><td><span class="badge-module">${agent.module}</span></td></tr>`;
        });
    </script>
</body>
</html>
