<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASD - Panel Instructeur</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --sheriff-brown: #4A3018;
            --sheriff-dark-brown: #2C1E11;
            --sheriff-light-brown: #8B5A2B;
            --sheriff-gold: #D4AF37;
            --bg-white: #FFFFFF;
            --bg-off-white: #F9F6F0;
            --text-dark: #2C1E11;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--bg-off-white);
        }

        h1, h2, h3, .logo, th {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        /* --- ÉCRAN DE CONNEXION SÉCURISÉ --- */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--sheriff-dark-brown);
            z-index: 9999; /* Reste toujours au-dessus du reste */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--bg-white);
        }

        #login-overlay h2 {
            color: var(--sheriff-gold);
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        #login-overlay p {
            margin-bottom: 20px;
            color: #E0D5C1;
            font-size: 1.1rem;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-top: 4px solid var(--sheriff-gold);
        }

        #password-input {
            padding: 12px;
            width: 250px;
            font-size: 1.2rem;
            text-align: center;
            border: none;
            border-radius: 3px;
            margin-bottom: 15px;
            font-family: 'Roboto', sans-serif;
        }

        #password-input:focus {
            outline: 2px solid var(--sheriff-gold);
        }

        .btn-login {
            padding: 12px 25px;
            background: var(--sheriff-gold);
            color: var(--sheriff-dark-brown);
            border: none;
            border-radius: 3px;
            font-family: 'Oswald', sans-serif;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-login:hover {
            background: #f1c40f;
        }

        /* Message d'erreur caché par défaut */
        #login-error {
            color: #ff4d4d;
            margin-top: 15px;
            font-weight: bold;
            display: none; 
        }

        /* --- FIN CONNEXION --- */

        /* Navigation */
        nav {
            background: var(--sheriff-brown);
            padding: 1rem 5%;
            border-bottom: 3px solid var(--sheriff-gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: var(--bg-white);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .logo span { color: var(--sheriff-gold); }

        .btn-back {
            color: var(--bg-white);
            text-decoration: none;
            font-weight: bold;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .btn-back:hover { color: var(--sheriff-gold); }

        /* Conteneur principal */
        .admin-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .admin-container { grid-template-columns: 1fr; }
        }

        /* Panneaux */
        .panel {
            background: var(--bg-white);
            padding: 2rem;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #EAEAEA;
            border-top: 5px solid var(--sheriff-brown);
        }

        .panel-title {
            color: var(--sheriff-brown);
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            border-bottom: 2px solid var(--bg-off-white);
            padding-bottom: 0.5rem;
        }

        /* Formulaire */
        .form-group { margin-bottom: 1.2rem; }

        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            color: var(--sheriff-brown);
            font-family: 'Oswald', sans-serif;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #CCC;
            border-radius: 3px;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-off-white);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--sheriff-brown);
            color: var(--bg-white);
            border: none;
            border-radius: 3px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .btn-submit:hover { background: var(--sheriff-light-brown); }

        /* Tableau */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th {
            background: var(--sheriff-brown);
            color: var(--bg-white);
            padding: 12px;
            text-align: left;
            font-size: 0.9rem;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #EAEAEA;
            font-size: 0.95rem;
        }

        tr:hover { background: var(--bg-off-white); }

        .badge-module {
            background: var(--sheriff-light-brown);
            color: var(--bg-white);
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #d9534f;
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .btn-delete:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <!-- ÉCRAN DE VERROUILLAGE -->
    <div id="login-overlay">
        <h2>⭐ ACCÈS RESTREINT ⭐</h2>
        <p>Ce terminal est réservé au Bureau de l'Instruction (SASD).</p>
        <div class="login-box">
            <input type="password" id="password-input" placeholder="Code d'autorisation...">
            <br>
            <button class="btn-login" onclick="checkPassword()">DÉVERROUILLER</button>
            <p id="login-error">Code incorrect (10-20). Accès refusé.</p>
        </div>
    </div>

    <!-- CONTENU DU PANEL (Masqué par l'écran noir ci-dessus) -->
    <nav>
        <div class="logo"><span>⭐</span> BUREAU DE L'INSTRUCTION</div>
        <a href="index.html" class="btn-back">⬅ Retour au site</a>
    </nav>

    <div class="admin-container">
        
        <div class="panel">
            <h2 class="panel-title">Enregistrer un Brevet</h2>
            <form id="roster-form">
                <div class="form-group">
                    <label>Matricule</label>
                    <input type="text" id="reg-matricule" placeholder="Ex: 142" required>
                </div>
                <div class="form-group">
                    <label>Nom de l'Agent</label>
                    <input type="text" id="reg-nom" placeholder="Ex: D. Smith" required>
                </div>
                <div class="form-group">
                    <label>Grade Actuel</label>
                    <select id="reg-grade" required>
                        <option value="">Sélectionner...</option>
                        <option value="Deputy I">Deputy I</option>
                        <option value="Deputy II">Deputy II</option>
                        <option value="Deputy III">Deputy III</option>
						<option value="SLD">SLD</option>
                        <option value="Sergent">Sergent</option>
						<option value="Sergent Chef">Sergent Chef</option>
                        <option value="Lieutenant">Lieutenant</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Brevet Validé</label>
                    <select id="reg-module" required>
                        <option value="">Sélectionner...</option>
                        <option value="Conduite Code 3">Conduite Code 3</option>
                        <option value="Manoeuvres PIT">Manoeuvres PIT</option>
                        <option value="Interceptor HP">Interceptor HP</option>
                        <option value="Off-Road Tactique">Off-Road Tactique</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">VALIDER L'ENREGISTREMENT</button>
            </form>
        </div>

        <div class="panel">
            <h2 class="panel-title">Roster Officiel - Division HP</h2>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Matricule</th>
                            <th>Nom</th>
                            <th>Grade</th>
                            <th>Brevet Obtenu</th>
                            <th>Date d'examen</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="roster-table-body">
                        <!-- Les données s'afficheront ici -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // --- SYSTÈME DE CONNEXION ---
        function checkPassword() {
            const input = document.getElementById('password-input').value;
            const errorMessage = document.getElementById('login-error');
            
            // ⚠️ MODIFIEZ LE MOT DE PASSE ENTRE LES GUILLEMETS CI-DESSOUS ⚠️
            const CODE_SECRET = "HP2026"; 

            if (input === CODE_SECRET) {
                // Si le code est bon, on fait disparaître l'écran noir
                document.getElementById('login-overlay').style.display = 'none';
            } else {
                // Si le code est faux, on affiche une erreur et on efface la case
                errorMessage.style.display = 'block';
                document.getElementById('password-input').value = '';
                
                // Optionnel : renvoyer sur la page d'accueil au bout de 2 secondes
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 2000);
            }
        }

        // Permet de valider le mot de passe en appuyant sur la touche "Entrée"
        document.getElementById('password-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
        // --- FIN SYSTÈME DE CONNEXION ---


        // Clé pour le stockage local
        const STORAGE_KEY = 'sasd_academy_roster';
        const form = document.getElementById('roster-form');
        const tableBody = document.getElementById('roster-table-body');

        // Fonction pour charger les données depuis la mémoire du navigateur
        function loadRoster() {
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            tableBody.innerHTML = ''; 
            
            if(data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; font-style:italic;">Aucun agent certifié dans la base de données locale.</td></tr>';
                return;
            }

            data.slice().reverse().forEach(agent => {
                const row = `
                    <tr>
                        <td><b>#${agent.matricule}</b></td>
                        <td>${agent.nom}</td>
                        <td>${agent.grade}</td>
                        <td><span class="badge-module">${agent.module}</span></td>
                        <td>${agent.date}</td>
                        <td><button class="btn-delete" onclick="deleteAgent(${agent.id})" title="Supprimer le dossier">❌</button></td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        // Fonction pour ajouter un nouvel agent
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const dateActuelle = new Date().toLocaleDateString('fr-FR');
            
            const newAgent = {
                id: Date.now(), 
                matricule: document.getElementById('reg-matricule').value,
                nom: document.getElementById('reg-nom').value,
                grade: document.getElementById('reg-grade').value,
                module: document.getElementById('reg-module').value,
                date: dateActuelle
            };

            const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            data.push(newAgent);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

            form.reset(); 
            loadRoster(); 
        });

        // Fonction pour supprimer un agent
        window.deleteAgent = function(id) {
            if(confirm("Attention (10-99) : Confirmez-vous la suppression de ce dossier d'instructeur ?")) {
                let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                data = data.filter(agent => agent.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                loadRoster();
            }
        };

        // Chargement automatique
        loadRoster();
    </script>
</body>
</html>
